server {
    listen 80;
    listen [::]:80;
    server_name as.wronamichal.online;

    location = / {
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://studify-backend:8080;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location ^~ /static/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://studify-backend:8080;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location = /api/plan_zajec_lekarski_as.ics {
        add_header X-Robots-Tag "noindex, nofollow" always;
        proxy_pass http://studify-backend:8080;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location / {
        add_header X-Robots-Tag "noindex, nofollow" always;
        return 404;
    }
}


server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 301 $scheme://www.linkedin.com/in/michalwrona01/$request_uri;
}